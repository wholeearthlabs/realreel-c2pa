name: Audit attestation roots

# Expiry watch for the pinned hardware-attestation roots in
# ca/_shared/attestation/roots.ts (Google Key Attestation + Apple App Attest).
# A pinned root silently expiring broke Samsung enrollment in 2026; this gives
# ~180 days of runway to rotate. Companion to audit-trust-anchors.yml, which
# watches the verifier's C2PA trust sources (a different subsystem).

on:
  schedule:
    - cron: '0 15 * * MON'   # Mondays 15:00 UTC (offset from audit-trust-anchors)
  workflow_dispatch:
  pull_request:
    paths:
      - 'ca/_shared/attestation/roots.ts'
      - 'ca/_shared/attestation/pki.ts'
      - 'ca/scripts/audit-attestation-roots.ts'
      - '.github/workflows/audit-attestation-roots.yml'

permissions:
  contents: read
  issues: write

concurrency:
  # Global group (no ref qualifier) on purpose: serializes the issue-writing
  # cron/dispatch runs so two concurrent failures can't open duplicate
  # attestation-roots tracking issues.
  group: audit-attestation-roots
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run attestation-root expiry audit
        id: audit
        continue-on-error: true
        working-directory: ca   # so ca/deno.json + ca/deno.lock (integrity pinning) load
        shell: bash
        run: |
          set -o pipefail
          # 2>&1 so a module-load throw (fingerprint self-check) still reaches the issue body.
          deno run --quiet --allow-read --allow-env --allow-net \
            scripts/audit-attestation-roots.ts 2>&1 | tee /tmp/audit-output.txt
          exit ${PIPESTATUS[0]}

      - name: Ensure tracking labels exist
        if: steps.audit.outcome == 'failure' && github.event_name != 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const labels = [
              { name: 'attestation-roots', color: 'D93F0B', description: 'Enrollment attestation-root expiry / rotation' },
              { name: 'audit', color: 'BFDADC', description: 'Automated audit findings' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name });
              } catch (e) {
                if (e.status !== 404) throw e;
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label });
              }
            }

      - name: Open or comment on tracking issue
        if: steps.audit.outcome == 'failure' && github.event_name != 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/audit-output.txt', 'utf-8');
            const today = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The attestation-root expiry audit reported a non-zero exit.',
              '', '```', output.trim(), '```', '',
              `Run: ${runUrl}`, '',
              'Rotate the affected pin in `ca/_shared/attestation/roots.ts`:',
              '- Google roots: pull the current set from https://android.googleapis.com/attestation/root',
              '- Apple App Attest root: https://www.apple.com/certificateauthority/',
              'Update the PEM **and** its EXPECTED_FINGERPRINTS entry, then redeploy register-signing-key.',
              'Close this issue once the pin has been rotated and deployed.',
            ].join('\n');
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, labels: 'attestation-roots', state: 'open',
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing[0].number, body: `Audit re-run on ${today}:\n\n${body}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: `Attestation-root audit: action required (${today})`,
                labels: ['attestation-roots', 'audit'], body,
              });
            }

      - name: Fail PR check when audit fails
        if: steps.audit.outcome == 'failure' && github.event_name == 'pull_request'
        run: |
          echo "Attestation-root audit failed on this PR — see the audit step output above."
          exit 1
