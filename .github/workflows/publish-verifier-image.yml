name: Publish verifier image (GHCR)

# Builds the verifier container image and publishes it to GHCR with SLSA build
# provenance attached — so anyone can pull, run, and independently verify the
# published image and how it was built. See verifier/DEPLOY.md
# § "Transparency: the published GHCR image".
#
# It also drafts a GitHub Release for the tag (notes from verifier/CHANGELOG.md)
# for a maintainer to review and publish — the verifier is private, so Changesets
# never creates one (only published npm packages get an auto-Release).
#
# Mirrors the npm Trusted-Publishing + provenance flow in release.yml: OIDC, no
# stored registry token, signed provenance generated automatically.

on:
  push:
    tags: ['verifier-v*'] # operator tags a verifier release, e.g. verifier-v1.4.0
  workflow_dispatch:

concurrency:
  group: publish-verifier-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the draft GitHub Release
  packages: write # push to ghcr.io
  id-token: write # OIDC for build-provenance attestation
  attestations: write # actions/attest persists the attestation

env:
  IMAGE: ghcr.io/wholeearthlabs/realreel-verifier

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          # verifier-v1.4.0 -> 1.4.0 + sha-<full> + (on a tag) latest.
          tags: |
            type=match,pattern=verifier-v(.*),group=1
            type=sha,format=long
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Context is the MONOREPO ROOT (.), Dockerfile under verifier/, pinned to
      # linux/amd64 — exactly as the Dockerfile header and DEPLOY.md document, so a
      # given commit produces a reproducible image. provenance:false keeps a plain
      # single-arch manifest (no buildx image-index), so the pushed digest is the
      # image itself — the subject the attestation below signs.
      - name: Build + push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: verifier/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      # create-storage-record:false: the optional org-artifacts record would need
      # an extra artifact-metadata:write permission the signed attestation doesn't.
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

      # Draft (not auto-published).
      # Only on a tag push — workflow_dispatch has no version to release.
      - name: Draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#verifier-v}"
          # Body = this version's section of the changelog, between its `## x.y.z`
          # heading and the next `## ` heading.
          awk -v hdr="## ${version}" '
            $0 == hdr {f=1; next}
            /^## / && f {exit}
            f
          ' verifier/CHANGELOG.md > notes.md
          {
            echo
            echo "---"
            echo "**Image:** \`${IMAGE}:${version}\` @ \`${{ steps.build.outputs.digest }}\` (linux/amd64, SLSA build provenance attested)."
          } >> notes.md
          gh release create "$GITHUB_REF_NAME" --draft --verify-tag \
            --title "verifier v${version}" --notes-file notes.md
